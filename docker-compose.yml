version: '3.8'

services:
  palicap:
    build:
      context: .
      dockerfile: docker/Dockerfile
    network_mode: "host"  # Required: allows capture of host network interfaces
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - PG_DSN=host=localhost port=5434 dbname=palicap user=palicap password=palicap
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    network_mode: "host"
    environment:
      POSTGRES_USER: palicap
      POSTGRES_PASSWORD: palicap
      POSTGRES_DB: palicap
      PGPORT: 5434     
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palicap -d palicap -p 5434"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    network_mode: "host"
    environment:
      - NODE_ENV=development
    depends_on:
      - palicap
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
